<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALKAMI | Metaphysical Streetwear</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&family=Cinzel:wght@700&family=Syncopate:wght@700&display=swap');

    :root {
      --bg-primary: #050505;
      --bg-secondary: #0A0A0A;
      --text-primary: #FFFFFF;
      --text-secondary: #888888;
      --accent-glow: #8A2BE2;
      --accent-neon: #00FFFF;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Background Nebula Animation */
    #nebula-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.6;
    }

    header {
      padding: 40px 20px;
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(24px, 5vw, 36px);
      letter-spacing: 12px;
      text-align: center;
      width: 100%;
      text-transform: uppercase;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 10;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 40px 24px;
      box-sizing: border-box;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      margin-top: 20px;
      margin-bottom: 80px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      z-index: 5;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .chip {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: transparent;
    }

    .chip:hover {
      border-color: rgba(255,255,255,0.3);
      color: var(--text-primary);
    }

    .chip.active {
      border-color: var(--accent-glow);
      background-color: rgba(138, 43, 226, 0.15);
      color: var(--text-primary);
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
    }

    .input-area {
      margin-bottom: 32px;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 12px 0;
      font-size: 18px;
      font-weight: 300;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.3s;
    }

    input[type="text"]::placeholder {
      color: #444;
      font-style: italic;
    }

    input[type="text"]:focus {
      border-bottom-color: var(--accent-glow);
      box-shadow: 0 10px 10px -10px rgba(138, 43, 226, 0.3);
    }

    button.generate-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent-glow);
      color: var(--text-primary);
      padding: 18px;
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
    }

    button.generate-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: 0.5s;
    }

    button.generate-btn:hover::before {
      left: 100%;
    }

    button.generate-btn:hover {
      background: rgba(138, 43, 226, 0.1);
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
      transform: scale(1.02);
    }

    .loading-spinner {
      display: none;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--accent-glow);
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mockup-container {
      display: none;
      margin-top: 50px;
      text-align: center;
      animation: reveal 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes reveal {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .mockup-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }

    .hoodie-box {
      width: 100%;
      height: 500px;
      background-color: #000;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    .hoodie-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.9;
      z-index: 2;
      pointer-events: none;
    }

    .design-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      filter: contrast(1.2) brightness(1.1);
      mix-blend-mode: screen;
      animation: breath 8s infinite ease-in-out;
    }

    /* Zipper simulation */
    .hoodie-box::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
      z-index: 3;
    }

    @keyframes breath {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    .checkout-btn {
      width: 100%;
      background: linear-gradient(45deg, var(--accent-glow), #4B0082);
      color: var(--text-primary);
      border: none;
      padding: 20px;
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 40px;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      text-transform: uppercase;
      box-sizing: border-box;
    }

    .checkout-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 40px;
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
    }

    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .vault-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      transition: transform 0.3s;
      cursor: pointer;
    }
    .vault-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-glow);
    }
    .vault-thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      background: #000;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .vault-tag {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--accent-neon);
      text-transform: uppercase;
    }
    .vault-name {
      font-size: 11px;
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .vault-section {
      width: 100%;
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <canvas id="nebula-canvas"></canvas>

  <header>DNT | DESIGN LAB</header>

  <div class="container">
    <div class="mode-toggle">
      <div class="chip active" id="chip-visionary">The Visionary</div>
      <div class="chip" id="chip-creator">The Creator</div>
    </div>

    <!-- The Visionary (Text) Mode Input -->
    <div class="input-area" id="visionary-area">
      <input type="text" id="prompt-input" placeholder="Manifest your DNT vision..." autocomplete="off">
    </div>

    <!-- The Creator (Sketch/Upload) Mode Input -->
    <div class="input-area" id="creator-area" style="display: none; border: 1px dashed var(--glass-border); padding: 40px 20px; border-radius: 12px; text-align: center; cursor: pointer; background: var(--glass); transition: all 0.3s;" onmouseover="this.style.borderColor='var(--accent-neon)'" onmouseout="this.style.borderColor='var(--glass-border)'">
      <div style="font-size: 32px; color: var(--accent-neon); margin-bottom: 12px;">?</div>
      <div style="font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--text-primary); text-transform: uppercase;">UPLOAD SKETCH OR TEXTURE</div>
      <div style="font-size: 11px; color: var(--text-secondary); margin-top: 8px;">Supports PNG, JPG, or SVG</div>
      <input type="file" id="file-input" style="display: none;" accept="image/*">
    </div>

    <button class="generate-btn" id="generate-btn">
      <span id="btn-text">INITIALIZE RECALIBRATION</span>
      <div class="loading-spinner" id="loading"></div>
    </button>

    <div class="mockup-container" id="mockup">
      <div class="mockup-label">DNT VIBRATION RECALIBRATION | AOP FULL-ZIP</div>
      <div class="hoodie-box">
        <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Hoodie Base" class="hoodie-image">
        <img src="" alt="Generated Design" class="design-overlay" id="generated-img">
      </div>
      
      <!-- LIVE: Doc Jordan Passive Income CTA -->
      <a href="https://docjordan.printify.me/" target="_blank" class="checkout-btn" id="shop-btn" style="text-decoration: none; display: block; text-align: center; line-height: 24px;">SHOP THIS COLLECTION ON PRINTIFY</a>
      <div class="footer-text">OFFICIAL DOC JORDAN POP-UP STORE | PASSIVE FULFILLMENT ACTIVE</div>
    </div>

    <!-- Brand Vault Section -->
    <div class="vault-section" id="vault">
      <h2 style="font-family: 'Syncopate', sans-serif; letter-spacing: 4px; font-size: 14px; margin-top: 80px; text-align: center; color: var(--text-secondary);">THE FOUNDER'S VAULT</h2>
      
      <!-- Brand Filter Tabs -->
      <div class="mode-toggle" style="margin-top: 20px; margin-bottom: 20px;">
        <div class="chip active brand-chip" data-brand="all">ALL</div>
        <div class="chip brand-chip" data-brand="Joe">JOE</div>
        <div class="chip brand-chip" data-brand="Alkami">ALKAMI</div>
        <div class="chip brand-chip" data-brand="Diva">DIVA</div>
      </div>

      <div class="vault-grid" id="vault-grid">
        <!-- Collection items will be injected here -->
      </div>
    </div>
  </div>

  <script>
    // Nebula Background Animation
    const canvas = document.getElementById('nebula-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.speedY = (Math.random() - 0.5) * 0.2;
        this.opacity = Math.random() * 0.5;
        this.color = Math.random() > 0.5 ? '#8A2BE2' : '#00FFFF';
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function createParticles() {
      particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initCanvas);
    initCanvas();
    createParticles();
    animate();

    // LIVE ENGINE CONFIGURATION
    const SUPABASE_PROJECT_URL = 'https://your-project-id.supabase.co';
    const GENERATE_FUNCTION_URL = `${SUPABASE_PROJECT_URL}/functions/v1/generate-design`;

    // UI Elements
    const generateBtn = document.getElementById('generate-btn');
    const btnText = document.getElementById('btn-text');
    const loading = document.getElementById('loading');
    const mockup = document.getElementById('mockup');
    const generatedImg = document.getElementById('generated-img');
    const promptInput = document.getElementById('prompt-input');
    const checkoutBtn = document.getElementById('shop-btn'); // Corrected from 'checkout-btn'

    // Mode Toggle elements
    const chipVisionary = document.getElementById('chip-visionary');
    const chipCreator = document.getElementById('chip-creator');
    const visionaryArea = document.getElementById('visionary-area');
    const creatorArea = document.getElementById('creator-area');
    const fileInput = document.getElementById('file-input');

    // Founder's Vault Data (Definitive Collection)
    const founderCollection = [
      { id: 'j1', brand: 'Joe', name: 'Concrete Resilience', img: 'https://images.unsplash.com/photo-1517511620798-cec17d428bc0?auto=format&fit=crop&w=400&q=80' },
      { id: 'j2', brand: 'Joe', name: 'Asphalt Dreamer', img: 'https://images.unsplash.com/photo-1505330622279-bf7d7fc918f4?auto=format&fit=crop&w=400&q=80' },
      { id: 'j3', brand: 'Joe', name: 'Street Truth AOP', img: 'https://images.unsplash.com/photo-1496568816309-51d7c7a8a121?auto=format&fit=crop&w=400&q=80' },
      { id: 'j4', brand: 'Joe', name: 'Rust & Blood', img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=400&q=80' },
      { id: 'j5', brand: 'Joe', name: 'Industrial Soul', img: 'https://images.unsplash.com/photo-1516937941344-00b4e0337589?auto=format&fit=crop&w=400&q=80' },
      { id: 'a1', brand: 'Alkami', name: 'Ethereal Frequency', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80' },
      { id: 'a2', brand: 'Alkami', name: 'Sacred Geometry', img: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=400&q=80' },
      { id: 'a3', brand: 'Alkami', name: 'Nebula Manifest', img: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=400&q=80' },
      { id: 'a4', brand: 'Alkami', name: 'Cymatic Pattern', img: 'https://images.unsplash.com/photo-1550684376-efcbd6e3f031?auto=format&fit=crop&w=400&q=80' },
      { id: 'a5', brand: 'Alkami', name: 'Astral Flow', img: 'https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=400&q=80' },
      { id: 'd1', brand: 'Diva', name: 'Empress Gold', img: 'https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?auto=format&fit=crop&w=400&q=80' },
      { id: 'd2', brand: 'Diva', name: 'Midnight Sovereign', img: 'https://images.unsplash.com/photo-1550684847-75bdda21cc95?auto=format&fit=crop&w=400&q=80' },
      { id: 'd3', brand: 'Diva', name: 'Fierce Grace', img: 'https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=400&q=80' },
      { id: 'd4', brand: 'Diva', name: 'Ornate Power', img: 'https://images.unsplash.com/photo-1557682250-33bd709cbe85?auto=format&fit=crop&w=400&q=80' },
      { id: 'd5', brand: 'Diva', name: 'Velvet Empress', img: 'https://images.unsplash.com/photo-1557682224-5b8590cd9ec5?auto=format&fit=crop&w=400&q=80' }
    ];

    function loadVault(brandFilter = 'all') {
      const grid = document.getElementById('vault-grid');
      const filteredCollection = brandFilter === 'all' 
        ? founderCollection 
        : founderCollection.filter(item => item.brand.toLowerCase() === brandFilter.toLowerCase());

      grid.innerHTML = filteredCollection.map(item => `
        <div class="vault-card" onclick="selectVaultItem('${item.id}')">
          <img src="${item.img}" class="vault-thumb" alt="${item.name}">
          <div class="vault-tag">${item.brand}</div>
          <div class="vault-name">${item.name}</div>
        </div>
      `).join('');
    }

    window.selectVaultItem = (id) => {
      const item = founderCollection.find(i => i.id === id);
      promptInput.value = `${item.brand}: ${item.name}`;
      generatedImg.src = item.img;
      mockup.style.display = 'block';
      mockup.scrollIntoView({ behavior: 'smooth' });
    };

    generateBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        promptInput.style.borderBottomColor = 'red';
        setTimeout(() => promptInput.style.borderBottomColor = '', 1000);
        return;
      }

      btnText.style.display = 'none';
      loading.style.display = 'block';
      generateBtn.disabled = true;
      mockup.style.display = 'none';

      try {
        const response = await fetch(GENERATE_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: prompt,
            userId: 'user_' + Math.random().toString(36).substr(2, 9),
            imageMode: 'text'
          })
        });

        if (!response.ok) throw new Error('Generation failed');
        const data = await response.json();
        generatedImg.src = data.design.image_url;
        mockup.style.display = 'block';
        mockup.scrollIntoView({ behavior: 'smooth' });
      } catch (error) {
        alert(`VISIONARY ERROR: ${error.message}`);
      } finally {
        btnText.style.display = 'block';
        loading.style.display = 'none';
        generateBtn.disabled = false;
      }
    });

    if (checkoutBtn) {
      checkoutBtn.addEventListener('click', () => {
        const originalText = checkoutBtn.innerText;
        checkoutBtn.innerText = 'REDIRECTING TO STRIPE...';
        checkoutBtn.style.opacity = '0.7';
        
        setTimeout(() => {
          alert('Stripe Checkout Session Initiated!\nSecure payment for Premium DNT Hoodie.');
          checkoutBtn.innerText = originalText;
          checkoutBtn.style.opacity = '1';
        }, 1500);
      });
    }

    // Toggle between Visionary and Creator Mode
    chipVisionary.addEventListener('click', () => {
      chipVisionary.classList.add('active');
      chipCreator.classList.remove('active');
      visionaryArea.style.display = 'block';
      creatorArea.style.display = 'none';
    });

    chipCreator.addEventListener('click', () => {
      chipCreator.classList.add('active');
      chipVisionary.classList.remove('active');
      visionaryArea.style.display = 'none';
      creatorArea.style.display = 'block';
    });

    creatorArea.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          promptInput.value = `Uploaded Sketch: ${file.name}`;
          generatedImg.src = event.target.result;
          mockup.style.display = 'block';
          mockup.scrollIntoView({ behavior: 'smooth' });
        };
        reader.readAsDataURL(file);
      }
    });

    // Vault brand filter selection
    document.querySelectorAll('.brand-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.brand-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        loadVault(chip.getAttribute('data-brand'));
      });
    });

    loadVault();
  </script>
</body>
</html>
